<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 V8 Engine Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="dashboard">
        <header class="dashboard__header">
            <img id="vehicle-logo" class="dashboard__logo" src="img/logo.png" alt="F1 V8">

            <button id="display-switch" class="switch" aria-pressed="false" disabled>
                <span class="switch__label">DISPLAY</span>
                <span class="switch__track"><span class="switch__thumb"></span></span>
            </button>
        </header>

        <section class="cluster">
          <div class="cluster__gauge">
            <canvas id="tach" class="tach" width="520" height="520"></canvas>
            <canvas id="tach-needle" class="tach__needle" width="520" height="520"></canvas>

            <div class="cluster__gear readout readout--gear">
                <span class="readout__value" id="gear-value">N</span>
            </div>

            <div class="cluster__digits">
                <div class="readout readout--rpm">
                    <span class="readout__value" id="rpm-value">0</span>
                    <span class="readout__label">RPM</span>
                </div>
                <div class="readout readout--speed">
                    <span class="readout__value" id="speed-value">0</span>
                    <span class="readout__label">KM/H</span>
                </div>
            </div>
          </div><!-- /cluster__gauge -->
        </section>

        <section class="controls">
            <div class="controls__row controls__row--util">
                <button id="btn-engine" class="btn btn--util" disabled>MOTOR</button>
                <button id="btn-auto" class="btn btn--util" disabled>AUTO: OFF</button>
            </div>

            <div class="controls__row controls__row--main">
                <button id="btn-brake" class="btn btn--pedal btn--brake" disabled>FREIO</button>

                <div class="controls__gears">
                    <button id="btn-up" class="btn btn--gear" disabled>
                        <span class="btn--gear__ico">▲</span>
                        <span class="btn--gear__cap">SOBE</span>
                    </button>
                    <button id="btn-down" class="btn btn--gear" disabled>
                        <span class="btn--gear__ico">▼</span>
                        <span class="btn--gear__cap">DESCE</span>
                    </button>
                </div>

                <button id="btn-gas" class="btn btn--pedal btn--gas" disabled>ACELERAR</button>
            </div>

            <p class="hint">
                Teclado: <strong>↑</strong> acelerar ·
                <strong>↓</strong> freio ·
                <strong>→ ←</strong> marchas ·
                <strong>K</strong> liga/desliga ·
                <strong>T</strong> auto
            </p>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
